# Nintendo 3DS build config — render-agnostic core only (no citro3d/raylib).
# scripts/build_3ds.sh copies this to nim.cfg and substitutes @DEVKITPRO@/@DEVKITARM@.

cc = "gcc"
arm.linux.gcc.path      = "@DEVKITARM@/bin"
arm.linux.gcc.exe       = "arm-none-eabi-gcc"
arm.linux.gcc.linkerexe = "arm-none-eabi-gcc"

--cpu:arm
--os:linux
--mm:arc
--threads:off
--define:useMalloc
--define:nimAllocPagesViaMalloc
--define:noSignalHandler
--define:ds3
--opt:size
--path:"src"

--passC:"-specs=3dsx.specs"
--passC:"-march=armv6k -mtune=mpcore -mfloat-abi=hard -mtp=soft"
--passC:"-D__3DS__ -DARM11"
--passC:"-I@DEVKITPRO@/libctru/include"

--passL:"-specs=3dsx.specs -march=armv6k -mtune=mpcore -mfloat-abi=hard"
--passL:"-L@DEVKITPRO@/libctru/lib -lctru"
--passL:"-lm"
--passL:"-Lstubs"
