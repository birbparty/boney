# Sony PS Vita build config — render-agnostic core only (no vitaGL/SDL2/raylib).
# scripts/build_vita.sh copies this to nim.cfg and substitutes @VITASDK@.
# -Wl,-q is MANDATORY: vita-elf-create needs retained relocations for SCE reloc
# generation; without it the module data-aborts at a non-link load base on hardware.

cc = "gcc"
arm.linux.gcc.path      = "@VITASDK@/bin"
arm.linux.gcc.exe       = "arm-vita-eabi-gcc"
arm.linux.gcc.linkerexe = "arm-vita-eabi-gcc"

--cpu:arm
--os:linux
--mm:arc
--threads:off
--define:useMalloc
--define:nimAllocPagesViaMalloc
--define:noSignalHandler
--opt:size
--path:"src"

--passL:"-Wl,-q"
--passC:"-I@VITASDK@/arm-vita-eabi/include"
--passL:"-L@VITASDK@/arm-vita-eabi/lib"
--passL:"-lc -lm"
--passL:"-lSceLibKernel_stub -lSceIofilemgr_stub -lSceProcessmgr_stub"
--passL:"-Lstubs"
