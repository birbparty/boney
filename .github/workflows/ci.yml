name: CI

on:
  push:
    branches: [main, "ralph/iteration-*"]
  pull_request:
    branches: [main]

# Cancel superseded runs on the same ref (relevant for ralph iteration pushes).
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# Test-only workflow — read access is sufficient.
permissions:
  contents: read

# ── Primary invariant gate ────────────────────────────────────────────────────
# Runs fast, requires no SDK, and completes before the full test suite starts.
# Required status check: this job must pass before merging.
jobs:
  invariants:
    name: Invariants (purity + ARM compile)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Set up Nim
        uses: jiro4989/setup-nim-action@v2
        with:
          nim-version: "2.2.x"
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Cache Nimble packages
        uses: actions/cache@v4
        with:
          path: ~/.nimble
          key: nimble-Linux-2.2.x-${{ hashFiles('boney.nimble') }}
          restore-keys: nimble-Linux-2.2.x-

      - name: Install dependencies
        run: nimble install -y --depsOnly

      - name: Core purity test
        # Verifies no desktop-only imports (jsony, naylib, etc.) leak into core.
        run: nim r --hints:off tests/test_core_purity.nim

      - name: SDK-free ARM compile check
        # nim.cfg provides --mm:arc --define:useMalloc; only cross-compile flags added here.
        # Checks all core modules (not just those reachable from one import root).
        run: |
          for module in \
            src/dragonbones/model/model.nim \
            src/dragonbones/anim/sample.nim \
            src/dragonbones/anim/transform.nim \
            src/dragonbones/anim/propagate.nim \
            src/dragonbones/anim/mesh.nim \
            src/dragonbones/anim/draworder.nim \
            src/dragonbones/anim/emit.nim \
            src/dragonbones/anim/events.nim \
            src/dragonbones/anim/ik.nim \
            src/dragonbones/parse/armature.nim \
            src/dragonbones/atlas/atlas.nim \
            src/dragonbones/boundary.nim; do
            nim check --hints:off --os:linux --cpu:arm --opt:size "$module"
          done

# ── Full test suite ───────────────────────────────────────────────────────────
# Runs after `invariants` passes. Matrix across OS and Nim versions.
# Required status check.
  test:
    name: Tests (Nim ${{ matrix.nim }}, ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    needs: [invariants]
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        # Matrix lower bound matches `requires "nim >= 2.0.0"` in boney.nimble.
        nim: ["2.2.x", "2.0.x"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Nim
        uses: jiro4989/setup-nim-action@v2
        with:
          nim-version: ${{ matrix.nim }}
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Cache Nimble packages
        uses: actions/cache@v4
        with:
          path: ~/.nimble
          key: nimble-${{ runner.os }}-${{ matrix.nim }}-${{ hashFiles('boney.nimble') }}
          restore-keys: nimble-${{ runner.os }}-${{ matrix.nim }}-

      - name: Install dependencies
        run: nimble install -y --depsOnly

      - name: Run test suite
        run: nimble test

# ── Optional console gates (SDK-gated; never block a merge) ──────────────────
# Enabled by setting repository variables (Settings → Variables → Actions):
#   ENABLE_CONSOLE_3DS=true   and secret DEVKITPRO / DEVKITARM
#   ENABLE_CONSOLE_VITA=true  and secret VITASDK
# vars.* is available in job if: conditions; secrets.* is not.
  console-3ds:
    name: Console — Nintendo 3DS
    runs-on: ubuntu-latest
    if: ${{ vars.ENABLE_CONSOLE_3DS == 'true' }}
    timeout-minutes: 30
    env:
      DEVKITPRO: ${{ secrets.DEVKITPRO }}
      DEVKITARM: ${{ secrets.DEVKITARM }}
    steps:
      - uses: actions/checkout@v4
      - name: Set up Nim
        uses: jiro4989/setup-nim-action@v2
        with:
          nim-version: "2.2.x"
          repo-token: ${{ secrets.GITHUB_TOKEN }}
      - name: Cache Nimble packages
        uses: actions/cache@v4
        with:
          path: ~/.nimble
          key: nimble-Linux-2.2.x-${{ hashFiles('boney.nimble') }}
          restore-keys: nimble-Linux-2.2.x-
      - name: Install dependencies
        run: nimble install -y --depsOnly
      - name: 3DS compile check
        run: bash scripts/build_3ds.sh

  console-vita:
    name: Console — Sony PS Vita
    runs-on: ubuntu-latest
    if: ${{ vars.ENABLE_CONSOLE_VITA == 'true' }}
    timeout-minutes: 30
    env:
      VITASDK: ${{ secrets.VITASDK }}
    steps:
      - uses: actions/checkout@v4
      - name: Set up Nim
        uses: jiro4989/setup-nim-action@v2
        with:
          nim-version: "2.2.x"
          repo-token: ${{ secrets.GITHUB_TOKEN }}
      - name: Cache Nimble packages
        uses: actions/cache@v4
        with:
          path: ~/.nimble
          key: nimble-Linux-2.2.x-${{ hashFiles('boney.nimble') }}
          restore-keys: nimble-Linux-2.2.x-
      - name: Install dependencies
        run: nimble install -y --depsOnly
      - name: Vita compile check
        run: bash scripts/build_vita.sh
