# Root nim.cfg — applies to all targets including editor LSP checks.
# Mirrors the console target profile (arc + useMalloc) so desktop builds
# catch the same memory model violations as 3DS/Vita builds.
--path:"src"
--mm:arc
--define:useMalloc
# Console-only defines (nimAllocPagesViaMalloc, noSignalHandler) intentionally
# live ONLY in nim_3ds.cfg / nim_vita.cfg — they are bare-metal allocator flags.
